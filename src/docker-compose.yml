version: '3.8'

services:
  postgres:
    image: postgres
    container_name: unihub-prim-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
      - ./database/01_init_schema.sql:/docker-entrypoint-initdb.d/01_init_schema.sql
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d unihub_db -U unihub" ]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: unihub-backend
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    volumes:
      - ./backend/src:/app/src
      - maven-repo:/root/.m2

networks:
  db:
    driver: bridge

volumes:
  db:
  maven-repo:
