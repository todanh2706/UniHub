version: '3.8'

services:
  postgres:
    image: postgres
    container_name: unihub-prim-db
    env_file:
      - .env
    ports: 
      - "5432:5432"
    volumes:
      - db:/data/postgres
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d postgres -U postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  db:
    driver: bridge

volumes:
  db:
